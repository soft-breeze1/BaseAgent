server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Redirect favicon.ico to favicon.svg
    location = /favicon.ico {
        log_not_found off;
        access_log off;
        return 204;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Disable caching for JS/CSS assets (so changes take effect immediately)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # SPA fallback (with no-cache for index.html)
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Docker embedded DNS resolver (prevents stale IP caching)
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # API proxy to backend
    location /api/ {
        set $backend_upstream "backend:8000";
        proxy_pass http://$backend_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    # Uploads proxy to backend (for avatars and uploaded files)
    # ★ ^~ 确保优先级高于正则表达式 location ~* \.(jpg|png|...)$
    location ^~ /uploads/ {
        set $backend_upstream "backend:8000";
        proxy_pass http://$backend_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Image cache optimization
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Health check proxy
    location /health {
        set $backend_upstream "backend:8000";
        proxy_pass http://$backend_upstream/health;
        proxy_set_header Host $host;
    }
}
